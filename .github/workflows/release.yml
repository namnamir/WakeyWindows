# Build the Native (C#) app and attach the exe to a GitHub Release.
# Trigger: push a tag v* (usually from "Prepare Release" workflow — no manual git needed).
# Version file and Native/WakeyNative.csproj are updated by Prepare Release before tagging.

name: Release Native Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create release and upload assets

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Native app
        run: dotnet publish Native/WakeyNative.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o Native/publish

      - name: Verify exe and list publish folder
        run: |
          if (-not (Test-Path "Native/publish/PowerManager.exe")) {
            Write-Error "PowerManager.exe not found. Contents of Native/publish:"
            Get-ChildItem -Path "Native/publish" -Recurse | ForEach-Object { $_.FullName }
            exit 1
          }
          Get-ChildItem "Native/publish" | ForEach-Object { $_.Name }

      - name: Create Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            Native/publish/PowerManager.exe
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
